name: Build & Release

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:

  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Execute unit tests
      run: dotnet test PCL.Core.Test/PCL.Core.Test.csproj

    - name: Publish (x64)
      run: dotnet publish "Big Screen Launcher Neorizon\Big Screen Launcher Neorizon.csproj" -c Release -r win-x64 --self-contained true -o ./publish/win-x64

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: BSLN-win-x64
        path: ./publish/win-x64

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: ./publish/win-x64/**
